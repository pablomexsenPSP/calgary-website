<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Calgary Signature</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #f5f0e6;
      color: #2b2118;
    }

    header {
      background: #2b2118;
      color: white;
      padding: 30px;
      text-align: center;
    }

    header h1 {
      font-size: 48px;
      letter-spacing: 6px;
    }

    .hero {
      padding: 100px 20px;
      text-align: center;
      background: linear-gradient(#d8c1a3, #f5f0e6);
    }

    .hero h2 {
      font-size: 40px;
      margin-bottom: 20px;
    }

    .btn {
      padding: 15px 30px;
      background: #2b2118;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
      gap: 20px;
      padding: 50px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
    }

    footer {
      background: #2b2118;
      color: white;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>

<body>

<header>
  <h1>CALGARY</h1>
  <p>TOUGH AS RAWHIDE</p>
</header>

<section class="hero">
  <h2>Denim vaquero con presencia real</h2>
  <p>Diseñado para el norte. Hecho para destacar.</p>
  <a class="btn" href="#">Comprar ahora</a>
</section>

<section class="products">
  <div class="card">
    <h3>Calgary Signature</h3>
    <p>Straight Fit · Straight Leg</p>
    <p>W32 L34</p>
  </div>

  <div class="card">
    <h3>Calgary Ranch</h3>
    <p>Boot Cut</p>
  </div>

  <div class="card">
    <h3>Calgary Workwear</h3>
    <p>Relaxed Fit</p>
  </div>
</section>

<footer>
  Calgary — Western Denim Goods
</footer>

</body>
</html>
